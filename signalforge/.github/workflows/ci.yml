name: CI
on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for any helper scripts)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write .env from GitHub secrets
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          ARTIFACTS_DIR=${{ secrets.ARTIFACTS_DIR }}
          RQ_QUEUE_NAME=${{ secrets.RQ_QUEUE_NAME }}
          EOF
        shell: bash

      - name: Install Docker Compose v2
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Start services (db + redis)
        run: docker compose up -d postgres redis

      - name: Run QA gate
        run: docker compose run --rm api python sentinelqa/gates/gate.py

      - name: Run tests
        run: docker compose run --rm api pytest

      - name: Stop services
        if: always()
        run: docker compose down
