services:
  api:
    build: .
    command: /code/scripts/start_api.sh
    env_file: .env
    volumes:
      - ./:/code
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;urllib.request.urlopen('http://localhost:8000/health',timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    build: .
    command: /code/scripts/start_worker.sh
    env_file: .env
    volumes:
      - ./:/code
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: signalforge
      POSTGRES_PASSWORD: signalforge
      POSTGRES_DB: signalforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
