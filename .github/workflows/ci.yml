name: CI
on:
  workflow_dispatch: {}
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check snapshot head SHA
        run: python3 -m sentinelqa.ci.check_snapshot_head

      - name: Set up Python (for any helper scripts)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Docker Compose v2
        uses: docker/setup-buildx-action@v3

      - name: Write .env
        env:
          DATABASE_URL: postgresql+psycopg://signalforge:signalforge@postgres:5432/signalforge
          REDIS_URL: redis://redis:6379/0
          ARTIFACTS_DIR: ${{ secrets.ARTIFACTS_DIR }}
          RQ_QUEUE_NAME: ${{ secrets.RQ_QUEUE_NAME }}
        run: python -m sentinelqa.ci.write_env --path .env

      - name: Build images
        run: docker compose build

      - name: Start services (db + redis + neo4j)
        run: docker compose up -d postgres redis neo4j

      - name: Wait for postgres:5432
        run: docker compose run --rm api python -m sentinelqa.ci.wait_tcp --host postgres --port 5432 --timeout 60

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://signalforge:signalforge@postgres:5432/signalforge
        run: docker compose run --rm api alembic upgrade head

      - name: Start api + worker
        run: docker compose up -d api worker

      - name: Wait for api health
        run: docker compose run --rm api python -m sentinelqa.ci.wait_http --url http://api:8000/health --timeout 180

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose ps
          echo "--- API logs ---"
          docker compose logs --no-color --tail=200 api || true
          echo "--- Worker logs ---"
          docker compose logs --no-color --tail=200 worker || true
          echo "--- Postgres logs ---"
          docker compose logs --no-color --tail=200 postgres || true
          echo "--- Redis logs ---"
          docker compose logs --no-color --tail=200 redis || true
          echo "--- Neo4j logs ---"
          docker compose logs --no-color --tail=200 neo4j || true

      - name: Seed run via API
        run: |
          docker compose run --rm api python -m sentinelqa.ci.seed_run --base-url http://api:8000
          mkdir -p artifacts
          test -s artifacts/latest_seed_run_id

      - name: Graph preflight (static)
        run: docker compose run --rm api python -m sentinelqa.ci.graph_preflight --mode static

      - name: Graph preflight (runtime)
        run: docker compose run --rm api python -m sentinelqa.ci.graph_preflight --mode runtime

      - name: Gate runner
        env:
          BENCH_BASELINE_PATH: sentinelqa/baselines/bench_baseline.json
        run: |
          test -s artifacts/latest_seed_run_id
          RUN_ID="$(cat artifacts/latest_seed_run_id)"
          docker compose run --rm api python -m sentinelqa.gates.runner --run-id "$RUN_ID"

      - name: Run tests
        run: docker compose run --rm api pytest

      - name: Stop services
        if: always()
        run: docker compose down

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        run: docker run --rm -v "${{ github.workspace }}":/repo -w /repo rhysd/actionlint:1.7.0
