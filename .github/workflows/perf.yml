name: Perf

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 5 * * *"

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for helper scripts)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write .env
        env:
          ARTIFACTS_DIR: ${{ secrets.ARTIFACTS_DIR }}
          RQ_QUEUE_NAME: ${{ secrets.RQ_QUEUE_NAME }}
        run: python -m sentinelqa.ci.write_env --path .env

      - name: Install Docker Compose v2
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Start services (db + redis)
        run: docker compose up -d postgres redis api worker

      - name: Wait for api health
        run: docker compose run --rm api python -m sentinelqa.ci.wait_http --url http://api:8000/health --timeout 180

      - name: Seed warmup run
        run: docker compose run --rm api python -m sentinelqa.ci.seed_run --base-url http://api:8000

      - name: Clean load artifacts
        run: rm -rf artifacts/load && mkdir -p artifacts/load
