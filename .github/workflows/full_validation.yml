name: Full Validation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  full-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker Compose v2
        uses: docker/setup-buildx-action@v3

      - name: Write .env
        env:
          DATABASE_URL: postgresql+psycopg://signalforge:signalforge@postgres:5432/signalforge
          REDIS_URL: redis://redis:6379/0
          ARTIFACTS_DIR: ${{ secrets.ARTIFACTS_DIR }}
          RQ_QUEUE_NAME: ${{ secrets.RQ_QUEUE_NAME }}
        run: python -m sentinelqa.ci.write_env --path .env

      - name: Build images
        run: docker compose build

      - name: Start services (db + redis + neo4j + api + worker)
        run: docker compose up -d postgres redis neo4j api worker

      - name: Wait for api health
        run: docker compose run --rm api python -m sentinelqa.ci.wait_http --url http://api:8000/health --timeout 180

      - name: Seed run via API
        run: |
          docker compose run --rm api python -m sentinelqa.ci.seed_run --base-url http://api:8000
          mkdir -p artifacts
          test -s artifacts/latest_seed_run_id

      - name: Gate runner (full validation)
        env:
          BENCH_BASELINE_PATH: sentinelqa/baselines/bench_baseline.json
          FAILURE_INJECTION: "1"
          DETERMINISTIC_REPLAY: "1"
        run: docker compose run --rm api python -m sentinelqa.gates.runner

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-artifacts
          path: artifacts/**
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
